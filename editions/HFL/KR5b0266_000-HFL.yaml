front:
  text: 太上靈寳淨明秘法篇上身八
  hash: sha256:c0eb3ae1082e737d34c81bdc10df3dfb082d42a6f7a9384bb07de00be53673f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0266_HFL_000-001a, image: hfl/0315/0315-100.png}
body:
  text: 逐日燒香行持法每日子時起燒香存道院向西法師面東立叩齒三十六通垂兩手掐寅放訣收手再拜一拜存一光圓數丈直照面又拜二拜叩齒九通呪曰道香德香无爲清淨自然香靈寳淨明眞香供養淨明靈寳天尊等六位都法主一切靈寳君帝君及天君神王諸宰主願我所行法速行遂我心上報君父母下救衆生苦眞炁常滿體役使諸百靈百靈盡皈依急急如律令念究畢吸炁一口吞度脫六親符前一道於父母六親本命之日用朱砂書符掐寅訣存身爲孝道明王念呪一徧書符或吞或佩存二帝君執符而行後一道於父母六親身死之日用朱砂書符掐卯訣存身爲孝道明王念呪一徧書符燒灰和泥塗於心上即亡者託此法力自然廻生和泥時二帝君執符以引亡人右此二道不限道數日燒各一道以爲存亡作福即二帝君執符以往或往益筭或往薦送即孝道之本也行此有功方能服錬身形服錬身形符掐坎訣朱書掐離訣朱書前二符於甲子日面東念呪掐訣各誦法一徧書符六十道日服之則自然眞炁滿足長生不死可以役使鬼神書符時存身爲孝道明王靈寳天尊二帝君立于左右行此有功方可行靈書散形符救治百病符前二符各面北念法一徧依前存想丸符呪水以服病者則病者即安如未安即用後二道符各次意使之則直符帝君自然而往行之旣乆救治旣多則呼召自至也念法書符只念一徧不住書之每住則再念不限道數發符時只念一徧束縛百邪符右凡有壇廟等爲人害者面北書之念呪五徧取五方眞炁各一口掐玉皇訣書之書符時存身爲孝道明王靈寳淨明天尊二帝君直符四聖衞護以行當慎所用不可妄行此符行之旣靈則乆而不必使人送於所在自有帝君執之以往安鎮呼召符右書此符時念呪掐玉皇訣取五方炁各一口凡欲召雨雪用朱書於鐵板上長五寸置於有龍處或欲擊物則置其上七日自至此未行靈書散符時須依此如散符旣熟則又可自然而知凡發符即念呪取本院符使炁元綱飛步法寳籙每於甲子日向東掐玉皇訣望斗口取北斗炁一口復取東方炁一口閉炁書符六十道訖念呪七徧呪曰司權除殺籍東極上生名寳籙可佩服用之超魂神靈靈天門開閉目念眞法身外有吾身此是超凡格急急如律令一日服一道用呪水吞之餘者以青袋佩之每於三元三㑹庚申甲子夜於静室内佩甲子日所篆寳籙以兩手掐卯文閉目靜思以閉炁不動舌拄上腭咽炁一口覺身外有身衣服形制如其本身在前前有星壇髙九尺二寸左日右月南斗在後北斗在前即有左右青龍白虎前後朱雀玄武翼之覺飄飄然直詣壇前丁罡三歩上壇一級廵壇左行念呪曰仙道渺莾元始之家我欲升壇清神變慮願得太上賜我流霞流霞之漿布炁芬芳我得服之可以歩罡五臟神君直日香宫聞吾秘呪亦各以安急急如律令念呪訖閉炁入地戸又復左行念呪曰无上大羅大羅玉清玉清之宫度法眞人聞吾秘呪度我尸形取彼玉霞以浄我神我今歩罡行之帝郷上謁玉皇急急如律令念呪訖閉炁入天門即第三重壇旣入天門如有仙人二人玉童玉女侍香傳言共六人次長跪閉目若有神人乗五色雲服以上清衣傳玉帝符金書照耀呼召子之名復有童子一人執彼瑶爵之中有玉霞漿北斗之中有一黒炁南斗之中有一赤炁日中有紅炁月中有白炁三台中有五色雜炁各一道流入盃中汝能受之再拜而飲閉炁放訣下壇念二篇靈書騰空如到天上飛入北斗之中三台之星蓋頂而行乃自魁星歩而至魒廻身入斗六步而出作三台之形乃出斗口左環七七歩犯火又東行自中過凡九九歩至太陽朝祖師上帝復乃右行自北斗入西斗八八歩至太隂朝祖師仙皇君右旋而出出即右行復左凡七反如環此无色界也定服見无色界中諸仙來迎於是周歷十方謁三十二天帝二十八宿見一宿即丁罡十二以廻生于斗宿即借箕宿之綱以行直還望北斗大魒之次乃交鋒之山右旋南向四十九歩而過重入火星宫經於太隂六六之後而謁水星由水東行計六十四歩再廻而行犯水借綱復出宫經於太隂之旁八十一歩以成金星細行逹于斗口三十五步而入土辰由土返行再入金星水木之宿而後直望北方金闕巍峩即三清上帝之所在也乃八歩而進長跪再拜呪曰地行賤臣某甲幸因宿世得遇聖師傳度祕訣使朝天闕凝神入静九炁澄明身外之身得飛天閫臣无任瞻天仰聖頓首再拜又呪曰幸膺玄貺遂遇聖師午夜飛神一心謁帝伏爲凡骨堅頑理難超舉精心孝悌以冀蒙恩果遂精求得承宸眷庻使道心堅固神思清明役使諸神咸遵旨喻伏願天恩允臣所奏又頓首再拜而出門外乃見本形就頂門呪曰虵蟬虵蟬脫壳離塵吾今朝眞上謁青雲欲使神人閉債封形舉爾以去秘訣靈靈忽自頂門而入則方乃是歩罡了也若小可行持則不過三五歩足矣欲專意求飛舉之法則莫大於此今有行綱黃白黒道之圖特具于後元綱飛歩之圖太上靈寳淨明祕法篇上太上靈寳淨明秘法篇下靈書上篇恒他蘇伽他音邪伽音加如此召四天門下謂之四明功曹掌行靈書之符凡欲告召鬼神指使必閉目望東方取炁四口掐訣先書此符然後方召諸神而書召神符俱知俱音具知音至召開目童子也瑟泥勃地泥音爾勃音鼻地音計召開耳童子也凡欲見鬼神形共鬼神言必閉目取南方赤炁一口又取北方黒炁一口掐訣書此二符用香水吞之弊音皮弊音譬召開頂童子也凡欲分形遊行取東方炁一口書符念呪掐訣書了閉炁將身一踴使所往如意娑合羅娑音莎合音甲召三魂也婆迦召七魄也喃盧盧音廬召六腑也雞波那召五臟也羯唎召九竅也陀彌底提召四肢也凡欲脫殻必先書此符六道望東取青炁六口掐訣書符六道吞之則衆神守護无散蕩也離瑟召天官也㪍𧹞㪍音鼻召地官也悉多召水官也凡欲召問即望天罡取炁三口掐訣念呪書之以置案上即至毗地奴抄毗音皮召四獸也凡行神布炁即以手望空掐訣念呪書符以吹於身之四傍即至也訶帝召雲雷也凡祈雨即望畢星取炁一口掐訣念呪書之置有龍處即至也野拏遮搫召天地衆神凡設醮請召望天門地戸鬼門各取炁一口書符念呪七徧焚之即至三慕召陽界神也般剌般音掇召隂界神也凡有追薦攝召用此掐訣念呪召問其所在悉泥毗俱召北斗諸法神將也凡欲召即子上取炁七口掐訣念呪書之荼輸西那召南斗諸法神將也凡欲召即午上取炁六口掐訣念呪書之曳都翳曇召淨明元帥使者也如有大事召問之望東取炁三口掐訣念呪書符握之揚歧囉召淨明諸帝君神王也如有差使者上巻八符合用者即召之望東取炁九口掐訣念呪書符罝於坐下比地叱陁召浄明使者典者謄籍判官也如召之問事即至望東取炁一口掐訣念呪置符於坐下你唎盤唎召淨明靈官等也如有救治召之望東取炁一口掐訣書符念呪燒之耶儜召六丁也莬㘕懴囉召六甲也如有追捉尋覔召之召六丁則以左手按鼻右孔吸炁一口念呪書符召六甲則以右手按鼻左孔吸炁一口念呪書之以符禠碎即至都嚧嘘即胡召納眞神也凡破壇伐廟請雨驅雷即召之使護衛用青紙書符掐訣念呪取其神炁一口佩之虚庶贍婆那召三甲也凡行報應秘法用以使之望西取太白炁一口掐訣念呪書符以禠之即至也它麽召通耳目騎吏乃天䇿神也凡攝召地獄天獄主用之如禁勘即以舌拄上腭黙念呪書之置於結獄處即禁鬼麽䅋多召譯語神也凡欲攝到精恠言語不通即召問之召時閉炁存見肺白吐炁以手望空隨炁書之掐訣黙念神呪罔迦音禍召主簿也主薄架閣神如有公案理㑹照證吐炁一口掐訣念呪書之燒化即至刺那召天庫神也凡爲官將請俸給即召之時掐玉皇訣念呪書符即至搫遮摩召行㕑也如欲絶火食即召之召時掐訣念呪書符一道吞之即送天㕑食也地扇遮波利那召天驥神也啒補稚視多啒音屈召天馬神也拏虎𤙖𤙖音庵召雲車風馬也此三符出神而有往旣召之召之皆取五方炁一口念呪掐訣書之以符置坐下即至嚧雍波召三甲都緫吏秘即使之書符掐訣念呪望西取炁一口書之符成吞之却於用時吹炁一口瑟悉地地音計召淨明執符三界功曹凡燒文字即用書時望東取炁一口掐訣念呪書符所發文字燒之騰崩伽召移山吏凡移山用之書符時望此斗取炁七口掐訣念呪書之梵阿弊凡移江海用之書符時閉炁念呪七徧掐訣書之以投水中即易流也跋夜茶召龍也召時辰上取炁九口書之念呪九徧送有龍處凡江海龍爲害即呼以戒之佘闇余音蛇召山神凡神凡有事召之即艮上取炁三口虚空以手書符念呪三徧吹之夜檐召金玉珠寳神也凡見有伏藏即召之使守也掐訣念呪以捉之訖埵彌泮吒凡有事係五岳召五岳吏使之書符時掐訣念呪七徧如召城隍社令神應干土地典者皆用此於其下先書名次以書符召者昔甞召南昌社公用之也弊乂演吉召弓弩神也合曵舍曵舍音式召刀劒神也乹質閉召戈神也㘑藥义召㦸神也烏什伐囉召旗神也凡有差使諸處兵將誅斬鬼神及秘用此五符各於北方取炁掐訣念呪書之符成以火燒之即兵將皆手執兵器也輸藍召火神也召使焚燒以手掐寅於午上取炁七口念呪書之以符置火中質多召水神也召使灌浸以手掐申於子上取炁一口念呪書之以符置水中地栗刺吒召藥神也以此用藥救治掐寅東方取炁三口書符念呪和藥用也瑟質夜那夜那夜波召霹靂大將凡欲召五雷必先召之以手掐大煞文念呪七徧書以置於所擊處以招雷也舍提召鎗神也召靈官五郎郭天大將使以行秘法也掐大煞文念呪七徧望北斗取炁以左手書符望空吹之雍莎召食毒等吏尼釤那召五雷也俱只他召八卦神君也凡欲結壇奉迎三界先以手掐中指念呪書此佩之嚧呼嗚召神行事問其事之當否以手向空念云唵即近於問事之後用也刃唵底那羅刀底刹那雲風居那舍蘇嚕那曇迦青那舍音舍召五雷使擊物也凡召時屈五指以大指押之掐寅取寅上五色炁五口書於桐木上針釘於所擊處也彌嚧合耶召隂啞無聲之雷也青莫召莫悞使嚧㸵伴召歘火大神巳上皆書於五雷符上疊書之訣莭使用如前也居訶耶用劒秘法也掐金刀訣指以吹符也悉怛又使劒自匣中躍也頼耆使劒歸也皆以手念呪書之彌唎劒入匣也使人勞其神想符形吹劒入也娑訶書此以與鬼神執以去也靈書下篇軌糜享釤軌音歸糜音米享音亨釤音釗召淨明院布炁日精月液帝君召時吸東方炁一口北方炁七口虚空中以右手指書符念呪吹病人跢揭跢音召淨明呪水神凡呪水自服吞符及治病皆取東方炁九口吹水中次以心想符一道直入水中毖𧹞召淨明行針神召時取茅九寸爲針心想其符在上念呪九徧針痛處剌召劒神以右手中旨望所用方書符一道吹之又毎日望西取劒炁一口望中旨上吹之此淨明炁劒也瓢叱赭瓢音標召亡過祖先凡追薦用之書符時寅上取生炁書之儜標召死魄也凡救危病用之可以展限再生用時東方取炁九口朱書與之吞菟掘𤙖上徒中窟下唵中中召宅神也甖粹蒿堙坤文召土地也昵辮樺召司命也凡救疾病摧鬼監生用之書符時閉炁一口黙念呪書之詛𥕺天𥕺音𣚈凡爲人解呪鬼也用時取北方炁一口書符召之訓教以符與之刳蠢蠕解殺傷鬼也凡有人曽殺傷被𡨚魂以此解之用時取北方炁一口書符召之使之託生不得爲冤對也蝦爲人解縊鬼也凡有縊鬼未經託生者念一徧掐訣書符貼之梟塊凡有溺鬼處以此符與之託化念呪一徧掐訣書之㣧缺解病鬼凡有復連蠱疰者用之以此符與疾者吞帶取東方炁三口念呪三徧書之累鑽解藥蠱毒或有飛蠱毒害人處以此解之用時以符燒並掐訣念呪五徧䧟涎去不忠也復毅去䛕諂也濫攪去貪也凡此者皆君民之大害也遇此書符召以變其心則皆改過爲忠廉正直之士皆掐訣念呪望其人以手書符吹之忤悃鶴鉞召鬼神行事也凡所在壇廟抽借兵將用之如篆此符則掐四指第二節念呪五徧書之撾戮蹙摝去不孝也此等正害於大法情理重者以此誅之召符神并劒夜戮其神此王法之所棄也冝愼用之无悮用時望其所在書符一道吹之掐王皇文念呪三徧扇愁攻蠻夷也蠻夷攵不慈子不孝侵于中國以此魘之當順也用時以戲望其所在書之置其所經之路用時望天罡取正炁一口念呪書之餒矟潰剚矟音積剚音土賞公廉也凡有此者用符吹之即其人自然福至書符掐訣念呪五徧書五道吹愗磑魘呼旱鬼也蠱俍誣殫熠樞紐湾㜸綴秉𡵨妓霰禠之二十書符時掐訣念呪十徧以符燒之驅邪割暴召魁罡也凡斬代邪魔掐訣念呪書之忿毳涎解人害也靴揖詈誅厭橫逆也凡自護身即用之念呪五徧掐訣書符佩之或爲人亦用此咄怛吽去殟毒也遣殟即用之用時取北炁七口念呪一徧書符七道於殟家燒之嚩宻囉娑訶嚩音馬厭百精也如用則占至考入十念呪掐訣書符鎮之唵戸嚧召閉息神也如行炁言閉息即用之用時以手摩鼻念呪書之吞下尾引摩解厭穢也凡過此乃見户之𩔖即書此符燒之書符時存想符有大火燒身掐寅呪七徧而後燒怛他去滛心也刀利除滛鬼也如遇心動即以朱書下利吞之即滅書符時呵炁五口掐訣念呪書之本蜆魁鬼去尸蟲也噷呵護炁也如願身鍊即先篆吞五日念呪七徧掐寅上望東取炁三口吹之飄籠矟那謹謹沙那銅虵蝎那召酆都百鬼也以正月十六日召至告戒之使不得害人書符時掐四指二節不住手書以燒之即至事訖遣用娑訶符風輪火車凡召到酆都鬼有罪鬼摶殺之如篆時念呪七徧望天罡取炁吹之以手書符帝居怛訶入天門也風火交加去身中惡也梵翳徵銷召貪罡力士也凡昇眞入天門用之也用時先得詔便書以備要用九梁橫梟揖巵泄誅靴詃詃訶籠詈姦吽凡昇眞巳入天門即以此符付貪罡力士乃録事神祗應恐入天樞不知次第縳只知那凡見録事又須召賞善判官也怛唎拏伽又召掌惡判官也三慕陀羅又召天門七十四司判官也旣召至判官即以下二符與之帝利此符云吾行羙也虵闇言一家盡良善也如此驗證有此二符即諸判官同録事給付劵矣雲目帝那召合符吏也吠伽婆帝合符了遣之去也旣得符劵即以此符召吏合而後遣翳婆伽多四天門下持所賜丹藥文字先到也只𡵨囉召天王合上帝所賜登殿劵也撾毗只知他召送天書便交謝表也翳帝夷帝召三清左右丞問朝謝之禮羅又底南召三清傳言玉女也喝喝刹婆召主吏也雞唎女訶召副吏也風輪火車所賜丹至以此符謝也凡此符自召録事以後不書訣節當自知之也太上靈寳淨明秘法篇下
